name: CI

# Single-developer repo: run on every push (feature branches get feedback
# before the PR opens; PRs don't double-run since we skip pull_request).
on:
  push:

jobs:
  backend:
    name: Backend — Django test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/InTouch
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intouch
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,testserver
      PG_DBNAME: intouch
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      PG_HOST: 127.0.0.1
      PG_PORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: Backend/InTouch/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django system checks
        run: python manage.py check
      - name: Run test suite
        run: python manage.py test intouch.api --verbosity 2

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/InTouch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Frontend/InTouch/npm-shrinkwrap.json
      - name: Install dependencies
        run: npm ci
      - name: Create production environment file
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            firebaseConfig: {
              apiKey: '${FIREBASE_API_KEY}',
              authDomain: '${FIREBASE_AUTH_DOMAIN}',
              projectId: '${FIREBASE_PROJECT_ID}',
              storageBucket: '${FIREBASE_STORAGE_BUCKET}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              appId: '${FIREBASE_APP_ID}',
              measurementId: '${FIREBASE_MEASUREMENT_ID}',
            },
            sentryDsn: '${SENTRY_DSN}',
            vapidKey: '${FIREBASE_VAPID_KEY}',
          };
          EOF
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
