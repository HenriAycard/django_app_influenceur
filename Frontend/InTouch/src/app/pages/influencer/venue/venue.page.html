<div class="ion-page">

  <ion-content>
    <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
      <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <ion-fab slot="fixed" vertical="top" horizontal="start">
      <ion-fab-button (click)="goBack()" fill="clear" style="--background: rgba(0, 0, 0, 0.5);">
        <ion-icon name="close" color="light"></ion-icon>
      </ion-fab-button>
    </ion-fab>

    @if (store.loaded()) {
      <div>
        <app-venue-main-view [venue]="store.venue()!"></app-venue-main-view>
        <ion-item lines="none">
          <h1 class="header-font header-margin">Collaborations</h1>
        </ion-item>
        @for (deal of store.offers(); track deal) {
          <app-offer-card [offer]="deal" (actionPerformed)="onActionPerformed($event)"
          ></app-offer-card>
        }
        <app-venue-reviews [venueId]="venueId"></app-venue-reviews>
      </div>
    }
    @if (!store.loaded()) {
      <div>
        <app-venue-skeleton></app-venue-skeleton>
      </div>
    }
  </ion-content>
</div>
