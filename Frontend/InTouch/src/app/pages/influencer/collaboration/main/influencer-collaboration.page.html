<ion-content [fullscreen]="true">
  <ion-fab slot="fixed" vertical="top" horizontal="start" class="back-fab">
    <ion-fab-button (click)="goBack()" aria-label="Back">
      <ion-icon name="arrow-back"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  @if (isLoad()) {
    <app-booking-view [reservation]="reservation()"></app-booking-view>
    <app-review-section [reservation]="reservation()" (reviewed)="loadData()"></app-review-section>

    <div class="shortcuts">
      <div class="shortcut-item" (click)="messageBrand()">
        <div class="shortcut-icon"><ion-icon name="chatbubble-ellipses-outline"></ion-icon></div>
        <span>Message</span>
      </div>
      @if (reservation().status === ApplicationStatus.Accepted) {
        <div class="shortcut-item" (click)="downloadContract()">
          <div class="shortcut-icon"><ion-icon name="document-text-outline"></ion-icon></div>
          <span>Contract</span>
        </div>
        <div class="shortcut-item" (click)="addToCalendar()">
          <div class="shortcut-icon"><ion-icon name="calendar-outline"></ion-icon></div>
          <span>Calendar</span>
        </div>
      }
    </div>

    @if ((reservation().status === ApplicationStatus.Pending || reservation().status === ApplicationStatus.Accepted) && isFuture()) {
      <div class="action-bar">
        <ion-button class="act act-danger" (click)="cancelReservation()">
          <ion-icon name="close-circle-outline" slot="start"></ion-icon>Cancel collaboration
        </ion-button>
      </div>
    }
  } @else {
    <div class="loading"><ion-spinner name="crescent"></ion-spinner></div>
  }
</ion-content>
