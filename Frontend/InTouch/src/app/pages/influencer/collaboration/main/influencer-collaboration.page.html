<ion-header class="collab-header ion-no-border" [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/influencer/calendar" text=""></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (isLoad()) {
    <app-booking-view [reservation]="reservation()"></app-booking-view>
    <app-review-section [reservation]="reservation()" (reviewed)="loadData()"></app-review-section>

    @if ((reservation().status === ApplicationStatus.Pending || reservation().status === ApplicationStatus.Accepted) && !isPastReservation()) {
      <div class="action-bar">
        <ion-button class="act act-danger" (click)="cancelReservation()">
          <ion-icon name="close-circle-outline" slot="start"></ion-icon>Cancel collaboration
        </ion-button>
      </div>
    }
  } @else {
    <div class="loading"><ion-spinner name="crescent"></ion-spinner></div>
  }
</ion-content>
