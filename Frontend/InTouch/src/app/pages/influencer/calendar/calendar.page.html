<ion-content [fullscreen]="true" class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Calendar</ion-title>
    </ion-toolbar>
  </ion-header>
    
    <ion-accordion-group>
      <ion-accordion value="first">
        <ion-item slot="header" color="light">
          <ion-icon name="help-outline" slot="start"></ion-icon>
          <ion-label label>Waiting for an answer</ion-label>
          <ion-label slot="end" class="no-margin">{{ store.iWaitingCount() }}</ion-label>
        </ion-item>
        <div slot="content">
          <app-calendar-influencer [collaborations]="store.iWaiting()"></app-calendar-influencer>
        </div>
      </ion-accordion>
      <ion-accordion value="second">
        <ion-item slot="header" color="light">
          <ion-icon name="time-outline" slot="start"></ion-icon>
          <ion-label>Last collaborations</ion-label>
          <ion-label slot="end" class="no-margin">{{ store.iPastCount() }}</ion-label>
        </ion-item>
        <div slot="content">
          <app-calendar-influencer [collaborations]="store.iPast()"></app-calendar-influencer>
        </div>
      </ion-accordion>
      <ion-accordion value="third">
        <ion-item slot="header" color="light">
          <ion-icon name="close-outline" slot="start"></ion-icon>
          <ion-label>Unsuccessful</ion-label>
          <ion-label slot="end" class="no-margin">{{ store.iDeclinedCount() }}</ion-label>
        </ion-item>
        <div slot="content">
          <app-calendar-influencer [collaborations]="store.iDeclined()"></app-calendar-influencer>
        </div>
      </ion-accordion>
    </ion-accordion-group>
    <div class="tab2Padding">
    <ion-text>
      <h2>Coming soon</h2>
    </ion-text>
    <p>
      <ion-text>
        {{ store.iComingSoonCount() }} collaboration(s) to come
      </ion-text>
    </p>
    <div slot="content">
      <app-calendar-influencer [collaborations]="store.iComingSoon()"></app-calendar-influencer>
    </div>
  </div>  

</ion-content>
