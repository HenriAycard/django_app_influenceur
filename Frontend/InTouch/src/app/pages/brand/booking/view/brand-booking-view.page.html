<ion-content [fullscreen]="true">
  <ion-fab slot="fixed" vertical="top" horizontal="start" class="back-fab">
    <ion-fab-button (click)="goBack()" aria-label="Back">
      <ion-icon name="arrow-back"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  @if (isLoad()) {
    <app-booking-view [reservation]="reservation()"></app-booking-view>
    <app-review-section [reservation]="reservation()" (reviewed)="loadData()"></app-review-section>

    @if (reservation().status === ApplicationStatus.Accepted) {
      <div class="action-bar">
        <ion-button class="act act-ghost" (click)="downloadContract()">
          <ion-icon name="document-text-outline" slot="start"></ion-icon>Download contract (PDF)
        </ion-button>
      </div>
    }

    @if (reservation().status !== ApplicationStatus.Declined && isFuture()) {
      <div class="action-bar">
        @if (reservation().status === ApplicationStatus.Pending) {
          <ion-button class="act act-ghost" (click)="cancelReservation()">Decline</ion-button>
          <ion-button class="act act-primary" (click)="acceptReservation()">
            <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>Accept
          </ion-button>
        } @else {
          <ion-button class="act act-ghost" (click)="editReservation()">
            <ion-icon name="create-outline" slot="start"></ion-icon>Edit date
          </ion-button>
          <ion-button class="act act-danger" (click)="cancelReservation()">
            <ion-icon name="close-circle-outline" slot="start"></ion-icon>Cancel
          </ion-button>
        }
      </div>
    }
  } @else {
    <div class="loading"><ion-spinner name="crescent"></ion-spinner></div>
  }

  <ion-modal #modal [presentingElement]="presentingElement">
    <ng-template>
      <app-modal-edit-reservation [reservation]="reservation()"
      (dismissChange)="onDismissChange($event)"></app-modal-edit-reservation>
    </ng-template>
  </ion-modal>
</ion-content>
