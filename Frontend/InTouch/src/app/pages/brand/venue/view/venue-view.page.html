<ion-content>
  <!-- Pull-to-refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Floating Action Buttons -->
  <ion-fab slot="fixed" vertical="top" horizontal="start">
    <ion-fab-button (click)="back()" fill="clear" class="fab-bg">
      <ion-icon name="close" color="light"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  @if (store.loaded()) {
    <div>
      <app-venue-main-view [venue]="store.venue()!"></app-venue-main-view>
      <ion-fab slot="fixed" vertical="top" horizontal="end">
        <ion-fab-button>
          <ion-icon name="chevron-down-circle"></ion-icon>
        </ion-fab-button>
        <ion-fab-list side="bottom">
          <ion-fab-button (click)="viewAnalytics()">
            <ion-icon name="stats-chart-outline"></ion-icon>
          </ion-fab-button>
          <ion-fab-button (click)="editVenue()">
            <ion-icon name="create-outline"></ion-icon>
          </ion-fab-button>
          <ion-fab-button>
            <ion-icon name="trash-outline"></ion-icon>
          </ion-fab-button>
        </ion-fab-list>
      </ion-fab>
      <ion-item lines="none">
        <ion-label class="ion-text-wrap">
          <h1 class="header-font">Collaborations</h1>
          <p>List of collaborations that you propose</p>
        </ion-label>
        <ion-button slot="end" size="default" fill="solid" [routerLink]="['offer/create']">New
        offer</ion-button>
      </ion-item>
      @for (deal of activeOffers(); track deal) {
        <app-offer-card [offer]="deal" (actionPerformed)="onActionPerformed($event)"
        ></app-offer-card>
      }
      @if (archivedOffers().length) {
        <ion-item button detail="true" lines="none" [routerLink]="['archives']">
          <ion-icon aria-hidden="true" name="archive-outline" slot="start"></ion-icon>
          <ion-label>Archived offers</ion-label>
          <ion-note slot="end">{{ archivedOffers().length }}</ion-note>
        </ion-item>
      }
      <app-venue-reviews [venueId]="venueId"></app-venue-reviews>
    </div>
  }

  @if (!store.loaded()) {
    <div>
      <app-venue-skeleton></app-venue-skeleton>
    </div>
  }


</ion-content>
