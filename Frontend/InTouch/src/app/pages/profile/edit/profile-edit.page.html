<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Edit Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="profileForm">
    <ion-item lines="none" class="ion-item">
      <fieldset class="input-item">
        <legend>First name</legend>
        <ion-input formControlName="firstname" type="text" autocapitalize="on" [clearInput]="true"></ion-input>
      </fieldset>
    </ion-item>
    <ion-item lines="none" class="ion-item">
      <fieldset class="input-item">
        <legend>Last name</legend>
        <ion-input formControlName="lastname" type="text" autocapitalize="on" [clearInput]="true"></ion-input>
      </fieldset>
    </ion-item>
    @if (isInfluencer) {
      <ion-item lines="none" class="ion-item">
        <fieldset class="input-item">
          <legend>Instagram</legend>
          <ion-input formControlName="instagram" type="text" [clearInput]="true"></ion-input>
        </fieldset>
      </ion-item>
    }
    @if (isInfluencer) {
      <ion-item lines="none" class="ion-item">
        <fieldset class="input-item">
          <legend>Tiktok</legend>
          <ion-input formControlName="tiktok" type="text" [clearInput]="true"></ion-input>
        </fieldset>
      </ion-item>
    }
    @if (isInfluencer) {
      <ion-item lines="none" class="ion-item">
        <fieldset class="input-item">
          <legend>Youtube</legend>
          <ion-input formControlName="youtube" type="text" [clearInput]="true"></ion-input>
        </fieldset>
      </ion-item>
    }
    <ion-button expand="block" shape="round" class="update-button" type="submit" (click)="onSubmit()">Update</ion-button>
  </form>
</ion-content>
