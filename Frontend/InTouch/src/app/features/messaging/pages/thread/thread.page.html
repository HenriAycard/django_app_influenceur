<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="backHref"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ name || 'Conversation' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="thread">
  <div class="messages">
    @for (m of messages(); track m.id) {
      <div class="bubble-row" [class.mine]="m.sender === myId">
        <div class="bubble" [class.mine]="m.sender === myId">
          <span class="body">{{ m.body }}</span>
          <span class="time">{{ m.createdAt | date:'shortTime' }}</span>
        </div>
      </div>
    } @empty {
      <div class="empty"><p>Say hello 👋</p></div>
    }
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar class="composer">
    <ion-textarea
      [(ngModel)]="draft"
      placeholder="Write a message…"
      [autoGrow]="true"
      rows="1"
      maxlength="2000"
      (keydown.enter)="$event.preventDefault(); send()"></ion-textarea>
    <ion-buttons slot="end">
      <ion-button (click)="send()" [disabled]="!draft.trim() || sending" class="send">
        <ion-icon slot="icon-only" name="paper-plane-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
