<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background-color:#fbfbfd; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#fbfbfd; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">
          <!-- Brand header -->
          <tr>
            <td style="padding:0 8px 18px;">
              <span style="font-size:20px; font-weight:800; color:#0E6E52; letter-spacing:-0.02em;">⚡ InTouch</span>
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td style="background:#ffffff; border-radius:16px; padding:32px 28px; box-shadow:0 1px 3px rgba(22,22,29,0.07);">
              <h1 style="margin:0 0 16px; font-size:22px; line-height:1.3; color:#16161d; letter-spacing:-0.01em;">{{ title }}</h1>
              {% for line in lines %}{% if line %}
              <p style="margin:0 0 12px; font-size:15px; line-height:1.6; color:#6b6b76;">{{ line }}</p>
              {% endif %}{% endfor %}
              {% if button_url %}
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:24px;">
                <tr>
                  <td style="background:#0E6E52; border-radius:12px;">
                    <a href="{{ button_url }}" style="display:inline-block; padding:14px 28px; font-size:15px; font-weight:700; color:#ffffff; text-decoration:none;">{{ button_label }}</a>
                  </td>
                </tr>
              </table>
              {% endif %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 8px 0; text-align:center;">
              <p style="margin:0; font-size:12px; color:#9a9aa5;">
                You receive this email because you have an InTouch account.<br>
                Notification emails can be turned off in <a href="{{ app_url }}" style="color:#0E6E52; text-decoration:none;">your profile</a>.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
